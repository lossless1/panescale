# Panescale Release Workflow
# Triggered by pushing a version tag: git tag v1.0.0 && git push --tags

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "Panescale ${{ github.ref_name }}" \
            --target "${{ github.sha }}" \
            --repo "${{ github.repository }}" || true

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: macos-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}-v2
          restore-keys: |
            macos-cargo-

      - run: npm ci

      - name: Build Tauri app (universal macOS)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSTC_WRAPPER: sccache
        run: npx tauri build --target universal-apple-darwin --bundles dmg,updater

      - name: Upload macOS artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in $(find src-tauri/target -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" 2>/dev/null); do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}" || true
          done
          # Generate latest.json for the updater
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SIG_FILE=$(find src-tauri/target -name "*.app.tar.gz.sig" | head -1)
          TAR_FILE=$(find src-tauri/target -name "*.app.tar.gz" | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$TAR_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            TAR_NAME=$(basename "$TAR_FILE")
            cat > /tmp/latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "See https://github.com/lossless1/panescale/releases/tag/v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/lossless1/panescale/releases/download/v${VERSION}/${TAR_NAME}",
                "signature": "${SIG}"
              },
              "darwin-x86_64": {
                "url": "https://github.com/lossless1/panescale/releases/download/v${VERSION}/${TAR_NAME}",
                "signature": "${SIG}"
              }
            }
          }
          ENDJSON
            echo "Uploading latest.json"
            gh release upload "${{ github.ref_name }}" /tmp/latest.json --clobber --repo "${{ github.repository }}" || true
          else
            echo "WARNING: No .app.tar.gz or .sig found — updater bundle may not have been generated"
            find src-tauri/target/release/bundle -type f 2>/dev/null | head -20
          fi

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}-v2
          restore-keys: |
            linux-cargo-

      - run: npm ci

      - name: Build Tauri app (Linux)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSTC_WRAPPER: sccache
        run: npx tauri build --bundles deb,appimage

      - name: Upload Linux artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in $(find src-tauri/target/release/bundle -name "*.deb" -o -name "*.AppImage" -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" 2>/dev/null); do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}" || true
          done

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}-v2
          restore-keys: |
            windows-cargo-

      - run: npm ci

      - name: Build Tauri app (Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSTC_WRAPPER: sccache
        run: npx tauri build --bundles msi,nsis

      - name: Upload Windows artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          for f in $(find "$BUNDLE_DIR" -name "*.msi" 2>/dev/null) $(find "$BUNDLE_DIR/nsis" -name "*.exe" 2>/dev/null); do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}" || true
          done

  publish:
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-windows]
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
