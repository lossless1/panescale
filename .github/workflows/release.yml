# Panescale Release Workflow
# Builds for macOS (universal), Linux (AppImage + deb), and Windows (MSI + NSIS)
# Triggered by pushing a version tag: git tag v1.0.0 && git push --tags
#
# To release: update version in package.json, src-tauri/Cargo.toml, and src-tauri/tauri.conf.json
# Then: git tag v{version} && git push --tags

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-cargo-

      - run: npm ci

      - name: Build Tauri app (universal macOS)
        run: npx tauri build --target universal-apple-darwin

      - name: Upload macOS artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Create draft release if it doesn't exist
          gh release create "$TAG" --draft --title "Panescale $TAG" --repo ${{ github.repository }} 2>/dev/null || true
          # Upload artifacts
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          for f in "$BUNDLE_DIR"/dmg/*.dmg; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber --repo ${{ github.repository }}
          done
          for f in "$BUNDLE_DIR"/macos/*.app.tar.gz; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber --repo ${{ github.repository }}
          done

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - run: npm ci

      - name: Build Tauri app (Linux)
        run: npx tauri build

      - name: Upload Linux artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" --draft --title "Panescale $TAG" --repo ${{ github.repository }} 2>/dev/null || true
          BUNDLE_DIR="src-tauri/target/release/bundle"
          for f in "$BUNDLE_DIR"/appimage/*.AppImage; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber --repo ${{ github.repository }}
          done
          for f in "$BUNDLE_DIR"/deb/*.deb; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber --repo ${{ github.repository }}
          done

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - run: npm ci

      - name: Build Tauri app (Windows)
        run: npx tauri build

      - name: Upload Windows artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" --draft --title "Panescale $TAG" --repo ${{ github.repository }} 2>/dev/null || true
          BUNDLE_DIR="src-tauri/target/release/bundle"
          for f in "$BUNDLE_DIR"/msi/*.msi; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber --repo ${{ github.repository }}
          done
          for f in "$BUNDLE_DIR"/nsis/*.exe; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber --repo ${{ github.repository }}
          done

  publish:
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-windows]
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.ref_name }} \
            --draft=false \
            --generate-notes \
            --repo ${{ github.repository }}
