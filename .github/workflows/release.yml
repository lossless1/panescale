# Panescale Release Workflow
# Builds for macOS (universal), Linux (AppImage + deb), and Windows (MSI + NSIS)
# Triggered by pushing a version tag: git tag v1.0.0 && git push --tags

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "Panescale ${{ github.ref_name }}" \
            --target "${{ github.sha }}" \
            --repo "${{ github.repository }}" || true

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-cargo-

      - run: npm ci

      - name: Build Tauri app (universal macOS)
        run: npx tauri build --target universal-apple-darwin

      - name: Upload macOS artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          echo "=== Finding bundle artifacts ==="
          find src-tauri/target -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app" -type d 2>/dev/null | head -20
          echo "=== Uploading ==="
          find src-tauri/target -name "*.dmg" | while read f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}"
          done
          find src-tauri/target -name "*.app.tar.gz" | while read f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}"
          done

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - run: npm ci

      - name: Build Tauri app (Linux)
        run: npx tauri build

      - name: Upload Linux artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          echo "=== Finding bundle artifacts ==="
          find src-tauri/target -name "*.AppImage" -o -name "*.deb" 2>/dev/null | head -20
          echo "=== Uploading ==="
          find src-tauri/target -name "*.AppImage" -o -name "*.deb" | while read f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}"
          done

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - run: npm ci

      - name: Build Tauri app (Windows)
        run: npx tauri build

      - name: Upload Windows artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          echo "=== Finding bundle artifacts ==="
          find src-tauri/target -name "*.msi" -o -name "*.exe" 2>/dev/null | head -20
          echo "=== Uploading ==="
          find src-tauri/target -name "*.msi" -o -name "*.exe" | while read f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}"
          done

  publish:
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-windows]
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
