<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient: deep purple to electric blue to teal -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- Secondary gradient for the back panel -->
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Accent gradient for the small panel -->
    <linearGradient id="grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <!-- Subtle shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E1B4B" flood-opacity="0.35"/>
    </filter>
    <!-- Background circle gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Back panel (larger, offset up-left) -->
  <rect x="80" y="72" width="240" height="300" rx="24" ry="24"
        fill="url(#grad2)" opacity="0.7" filter="url(#shadow)"/>

  <!-- Front panel (main, offset down-right, overlapping) -->
  <rect x="180" y="140" width="260" height="310" rx="24" ry="24"
        fill="url(#grad1)" filter="url(#shadow)"/>

  <!-- Small accent panel (top-right area) -->
  <rect x="310" y="80" width="120" height="100" rx="18" ry="18"
        fill="url(#grad3)" opacity="0.85" filter="url(#shadow)"/>

  <!-- Subtle inner lines on front panel to suggest terminal/content -->
  <rect x="206" y="176" width="140" height="6" rx="3" fill="white" opacity="0.25"/>
  <rect x="206" y="196" width="100" height="6" rx="3" fill="white" opacity="0.18"/>
  <rect x="206" y="216" width="120" height="6" rx="3" fill="white" opacity="0.12"/>
</svg>
