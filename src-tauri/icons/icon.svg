<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181B"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <!-- Terminal window gradient -->
    <linearGradient id="win" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27272A"/>
      <stop offset="100%" stop-color="#1C1C1E"/>
    </linearGradient>
    <!-- Accent glow -->
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <!-- Cursor gradient -->
    <linearGradient id="cursor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Grid dot color -->
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3F3F46"/>
      <stop offset="100%" stop-color="#27272A"/>
    </radialGradient>
    <!-- Soft shadow -->
    <filter id="sh" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle canvas grid dots -->
  <g opacity="0.3">
    <circle cx="96" cy="96" r="3" fill="#3F3F46"/>
    <circle cx="160" cy="96" r="3" fill="#3F3F46"/>
    <circle cx="224" cy="96" r="3" fill="#3F3F46"/>
    <circle cx="288" cy="96" r="3" fill="#3F3F46"/>
    <circle cx="352" cy="96" r="3" fill="#3F3F46"/>
    <circle cx="416" cy="96" r="3" fill="#3F3F46"/>
    <circle cx="96" cy="160" r="3" fill="#3F3F46"/>
    <circle cx="416" cy="160" r="3" fill="#3F3F46"/>
    <circle cx="96" cy="224" r="3" fill="#3F3F46"/>
    <circle cx="416" cy="224" r="3" fill="#3F3F46"/>
    <circle cx="96" cy="288" r="3" fill="#3F3F46"/>
    <circle cx="416" cy="288" r="3" fill="#3F3F46"/>
    <circle cx="96" cy="352" r="3" fill="#3F3F46"/>
    <circle cx="416" cy="352" r="3" fill="#3F3F46"/>
    <circle cx="96" cy="416" r="3" fill="#3F3F46"/>
    <circle cx="160" cy="416" r="3" fill="#3F3F46"/>
    <circle cx="224" cy="416" r="3" fill="#3F3F46"/>
    <circle cx="288" cy="416" r="3" fill="#3F3F46"/>
    <circle cx="352" cy="416" r="3" fill="#3F3F46"/>
    <circle cx="416" cy="416" r="3" fill="#3F3F46"/>
  </g>

  <!-- Back terminal window (smaller, upper left) -->
  <rect x="80" y="110" width="200" height="160" rx="16" ry="16"
        fill="url(#win)" stroke="#3F3F46" stroke-width="1" opacity="0.6" filter="url(#sh)"/>
  <!-- Title bar dots -->
  <circle cx="100" cy="128" r="4" fill="#EF4444" opacity="0.5"/>
  <circle cx="114" cy="128" r="4" fill="#EAB308" opacity="0.5"/>
  <circle cx="128" cy="128" r="4" fill="#22C55E" opacity="0.5"/>
  <!-- Text lines -->
  <rect x="100" y="150" width="80" height="4" rx="2" fill="#52525B" opacity="0.5"/>
  <rect x="100" y="164" width="60" height="4" rx="2" fill="#52525B" opacity="0.4"/>

  <!-- Main terminal window (front, larger) -->
  <rect x="160" y="200" width="280" height="220" rx="18" ry="18"
        fill="url(#win)" stroke="#3F3F46" stroke-width="1.5" filter="url(#sh)"/>
  <!-- Title bar -->
  <rect x="160" y="200" width="280" height="36" rx="18" ry="18" fill="#1C1C1E"/>
  <rect x="160" y="218" width="280" height="18" fill="#1C1C1E"/>
  <!-- Title bar dots -->
  <circle cx="182" cy="218" r="5" fill="#EF4444" opacity="0.8"/>
  <circle cx="198" cy="218" r="5" fill="#EAB308" opacity="0.8"/>
  <circle cx="214" cy="218" r="5" fill="#22C55E" opacity="0.8"/>

  <!-- Terminal content -->
  <!-- Prompt line with chevron -->
  <text x="184" y="262" font-family="monospace" font-size="16" font-weight="bold" fill="url(#glow)" opacity="0.9">&#x276F;</text>
  <rect x="200" y="252" width="100" height="4" rx="2" fill="#A1A1AA" opacity="0.4"/>

  <!-- Output lines -->
  <rect x="184" y="278" width="160" height="4" rx="2" fill="#52525B" opacity="0.5"/>
  <rect x="184" y="294" width="120" height="4" rx="2" fill="#52525B" opacity="0.4"/>
  <rect x="184" y="310" width="200" height="4" rx="2" fill="#52525B" opacity="0.35"/>

  <!-- Active prompt with blinking cursor -->
  <text x="184" y="342" font-family="monospace" font-size="16" font-weight="bold" fill="url(#glow)" opacity="0.9">&#x276F;</text>
  <rect x="200" y="332" width="80" height="4" rx="2" fill="#A1A1AA" opacity="0.3"/>
  <!-- Cursor block -->
  <rect x="286" y="328" width="10" height="16" rx="2" fill="url(#cursor)" filter="url(#glow-f)" opacity="0.9"/>

  <!-- Small floating note tile (top right) -->
  <rect x="320" y="90" width="110" height="80" rx="12" ry="12"
        fill="#1C1C1E" stroke="#3F3F46" stroke-width="1" opacity="0.5" filter="url(#sh)"/>
  <rect x="336" y="110" width="70" height="3" rx="1.5" fill="#52525B" opacity="0.4"/>
  <rect x="336" y="120" width="50" height="3" rx="1.5" fill="#52525B" opacity="0.3"/>
  <rect x="336" y="130" width="60" height="3" rx="1.5" fill="#52525B" opacity="0.25"/>
</svg>
