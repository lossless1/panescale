<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </linearGradient>
    <!-- Cursor gradient -->
    <linearGradient id="cursor" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#B794F6"/>
      <stop offset="40%" stop-color="#9F7AEA"/>
      <stop offset="100%" stop-color="#805AD5"/>
    </linearGradient>
    <!-- Glow layers -->
    <radialGradient id="glow-outer" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#6D28D9" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#4C1D95" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-inner" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <!-- Cursor soft shadow -->
    <filter id="cursor-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle border/edge highlight -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="none" stroke="#27272A" stroke-width="1"/>

  <!-- Grid dots - full grid pattern -->
  <g opacity="0.25">
    <!-- Row 1 -->
    <circle cx="80" cy="80" r="2.5" fill="#3F3F46"/>
    <circle cx="124" cy="80" r="2.5" fill="#3F3F46"/>
    <circle cx="168" cy="80" r="2.5" fill="#3F3F46"/>
    <circle cx="212" cy="80" r="2.5" fill="#3F3F46"/>
    <circle cx="256" cy="80" r="2.5" fill="#3F3F46"/>
    <circle cx="300" cy="80" r="2.5" fill="#3F3F46"/>
    <circle cx="344" cy="80" r="2.5" fill="#3F3F46"/>
    <circle cx="388" cy="80" r="2.5" fill="#3F3F46"/>
    <circle cx="432" cy="80" r="2.5" fill="#3F3F46"/>
    <!-- Row 2 -->
    <circle cx="80" cy="124" r="2.5" fill="#3F3F46"/>
    <circle cx="124" cy="124" r="2.5" fill="#3F3F46"/>
    <circle cx="168" cy="124" r="2.5" fill="#3F3F46"/>
    <circle cx="212" cy="124" r="2.5" fill="#3F3F46"/>
    <circle cx="256" cy="124" r="2.5" fill="#3F3F46"/>
    <circle cx="300" cy="124" r="2.5" fill="#3F3F46"/>
    <circle cx="344" cy="124" r="2.5" fill="#3F3F46"/>
    <circle cx="388" cy="124" r="2.5" fill="#3F3F46"/>
    <circle cx="432" cy="124" r="2.5" fill="#3F3F46"/>
    <!-- Row 3 -->
    <circle cx="80" cy="168" r="2.5" fill="#3F3F46"/>
    <circle cx="124" cy="168" r="2.5" fill="#3F3F46"/>
    <circle cx="168" cy="168" r="2.5" fill="#3F3F46"/>
    <circle cx="212" cy="168" r="2.5" fill="#3F3F46"/>
    <circle cx="256" cy="168" r="2.5" fill="#3F3F46"/>
    <circle cx="300" cy="168" r="2.5" fill="#3F3F46"/>
    <circle cx="344" cy="168" r="2.5" fill="#3F3F46"/>
    <circle cx="388" cy="168" r="2.5" fill="#3F3F46"/>
    <circle cx="432" cy="168" r="2.5" fill="#3F3F46"/>
    <!-- Row 4 -->
    <circle cx="80" cy="212" r="2.5" fill="#3F3F46"/>
    <circle cx="124" cy="212" r="2.5" fill="#3F3F46"/>
    <circle cx="168" cy="212" r="2.5" fill="#3F3F46"/>
    <circle cx="212" cy="212" r="2.5" fill="#3F3F46"/>
    <circle cx="256" cy="212" r="2.5" fill="#3F3F46"/>
    <circle cx="300" cy="212" r="2.5" fill="#3F3F46"/>
    <circle cx="344" cy="212" r="2.5" fill="#3F3F46"/>
    <circle cx="388" cy="212" r="2.5" fill="#3F3F46"/>
    <circle cx="432" cy="212" r="2.5" fill="#3F3F46"/>
    <!-- Row 5 (center) -->
    <circle cx="80" cy="256" r="2.5" fill="#3F3F46"/>
    <circle cx="124" cy="256" r="2.5" fill="#3F3F46"/>
    <circle cx="168" cy="256" r="2.5" fill="#3F3F46"/>
    <circle cx="212" cy="256" r="2.5" fill="#3F3F46"/>
    <circle cx="300" cy="256" r="2.5" fill="#3F3F46"/>
    <circle cx="344" cy="256" r="2.5" fill="#3F3F46"/>
    <circle cx="388" cy="256" r="2.5" fill="#3F3F46"/>
    <circle cx="432" cy="256" r="2.5" fill="#3F3F46"/>
    <!-- Row 6 -->
    <circle cx="80" cy="300" r="2.5" fill="#3F3F46"/>
    <circle cx="124" cy="300" r="2.5" fill="#3F3F46"/>
    <circle cx="168" cy="300" r="2.5" fill="#3F3F46"/>
    <circle cx="212" cy="300" r="2.5" fill="#3F3F46"/>
    <circle cx="256" cy="300" r="2.5" fill="#3F3F46"/>
    <circle cx="300" cy="300" r="2.5" fill="#3F3F46"/>
    <circle cx="344" cy="300" r="2.5" fill="#3F3F46"/>
    <circle cx="388" cy="300" r="2.5" fill="#3F3F46"/>
    <circle cx="432" cy="300" r="2.5" fill="#3F3F46"/>
    <!-- Row 7 -->
    <circle cx="80" cy="344" r="2.5" fill="#3F3F46"/>
    <circle cx="124" cy="344" r="2.5" fill="#3F3F46"/>
    <circle cx="168" cy="344" r="2.5" fill="#3F3F46"/>
    <circle cx="212" cy="344" r="2.5" fill="#3F3F46"/>
    <circle cx="256" cy="344" r="2.5" fill="#3F3F46"/>
    <circle cx="300" cy="344" r="2.5" fill="#3F3F46"/>
    <circle cx="344" cy="344" r="2.5" fill="#3F3F46"/>
    <circle cx="388" cy="344" r="2.5" fill="#3F3F46"/>
    <circle cx="432" cy="344" r="2.5" fill="#3F3F46"/>
    <!-- Row 8 -->
    <circle cx="80" cy="388" r="2.5" fill="#3F3F46"/>
    <circle cx="124" cy="388" r="2.5" fill="#3F3F46"/>
    <circle cx="168" cy="388" r="2.5" fill="#3F3F46"/>
    <circle cx="212" cy="388" r="2.5" fill="#3F3F46"/>
    <circle cx="256" cy="388" r="2.5" fill="#3F3F46"/>
    <circle cx="300" cy="388" r="2.5" fill="#3F3F46"/>
    <circle cx="344" cy="388" r="2.5" fill="#3F3F46"/>
    <circle cx="388" cy="388" r="2.5" fill="#3F3F46"/>
    <circle cx="432" cy="388" r="2.5" fill="#3F3F46"/>
    <!-- Row 9 -->
    <circle cx="80" cy="432" r="2.5" fill="#3F3F46"/>
    <circle cx="124" cy="432" r="2.5" fill="#3F3F46"/>
    <circle cx="168" cy="432" r="2.5" fill="#3F3F46"/>
    <circle cx="212" cy="432" r="2.5" fill="#3F3F46"/>
    <circle cx="256" cy="432" r="2.5" fill="#3F3F46"/>
    <circle cx="300" cy="432" r="2.5" fill="#3F3F46"/>
    <circle cx="344" cy="432" r="2.5" fill="#3F3F46"/>
    <circle cx="388" cy="432" r="2.5" fill="#3F3F46"/>
    <circle cx="432" cy="432" r="2.5" fill="#3F3F46"/>
  </g>

  <!-- Outer glow (wide, diffuse) -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="url(#glow-outer)"/>

  <!-- Inner glow (concentrated) -->
  <ellipse cx="256" cy="256" rx="110" ry="110" fill="url(#glow-inner)"/>

  <!-- Cursor glow (blurred copy behind) -->
  <rect x="226" y="206" width="60" height="100" rx="10" fill="#8B5CF6" opacity="0.6" filter="url(#cursor-glow)"/>

  <!-- Terminal cursor block -->
  <rect x="226" y="206" width="60" height="100" rx="10" fill="url(#cursor)" opacity="0.9"/>

  <!-- Cursor inner highlight (glass effect) -->
  <rect x="232" y="212" width="48" height="40" rx="6" fill="white" opacity="0.08"/>
</svg>
